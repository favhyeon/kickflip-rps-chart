<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>킥페스 취향표 생성기</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="킥페스 취향표 생성기">
    <meta property="og:description" content="나만의 킥페스 취향표를 만들어 보세요!">
    <meta property="og:url" content="https://favhyeon.github.io/kickflip-rps-chart/">
    <meta property="og:image" content="https://favhyeon.github.io/kickflip-rps-chart/assets/og.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="킥페스 취향표 생성기">
    <meta name="twitter:description" content="나만의 킥페스 취향표를 만들어 보세요!">
    <meta name="twitter:image" content="https://favhyeon.github.io/kickflip-rps-chart/assets/og.png">

    <link
        rel="stylesheet"
        href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>

<body>

<div class="wrapper">


    <div
        id="captureArea"
        class="capture-area">

        <img src="assets/logo2.png" class="logo" alt="KickFlip">
        <h1> 
            RPS 취향표
        </h1>

        <div class="capture-id"> 
            @favhyeon
        </div>

    <div class="table-wrap">
        <table id="chartTable">
        </table>
    </div>

        <div class="legend">

            <div class="legend-item">

                <span
                    class="color otp">
                </span>

                OTP

            </div>

            <div class="legend-item">

                <span
                    class="color love">
                </span>

                좋아함

            </div>

            <div class="legend-item">

                <span
                    class="color like">
                </span>

                호감

            </div>

            <div class="legend-item">

                <span
                    class="color okay">
                </span>

                괜찮음

            </div>

            <div class="legend-item">

                <span
                    class="color none">
                </span>

                관심 X

            </div>

            <div class="legend-item">

                <span
                    class="color bad">
                </span>

                별로

            </div>

            <div class="legend-item">

                <span
                    class="color hate">
                </span>

                지뢰

            </div>

        </div>

    </div>

    <div class="button-wrap">

        <button
            id="saveBtn">

            이미지 저장

        </button>

        <button
            id="resetBtn">

            초기화

        </button>

    </div>

      <!-- 색상 선택 모달 -->

    <div
        id="modal"
        class="modal hidden">

        <div class="modal-box">

            <button
                id="closeModal"
                class="close-btn">

                ×

            </button>

            <h2
                id="shipTitle">

                커플명

            </h2>

            <div
                id="optionList">

            </div>

            <button
                id="clearSelection"
                class="clear-btn">

                선택 지우기

            </button>

        </div>

    </div>

    <!-- 저장 완료 모달 -->

    <div
        id="saveModal"
        class="modal hidden">

        <div class="save-box">

            <h2>

                이미지가 저장되었습니다!

            </h2>

            <p>

                아래는 저장된 이미지 미리보기입니다.

            </p>

            <img
                id="previewImage"
                alt="preview">

            <button
                id="closeSaveModal">

                확인

            </button>

        </div>

    </div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
